{% extends 'base.html' %}

{% block content %}

<div class="page-header mb-4">
    <h2>Export</h2>
    <p class="subtitle">Download your balance sheet information as a CSV file.</p>
</div>

<div class="card p-4 shadow-sm">
    <p>Use the tools below to import or export your company and balance sheet data for offline review.</p>
    <div class="d-flex flex-wrap gap-2 mb-3">
        <a href="/export/csv" class="btn btn-primary">Download CSV</a>
        <a href="/export/pdf" class="btn btn-outline-secondary">Download PDF</a>
        <a href="/" class="btn btn-outline-secondary">Back to Dashboard</a>
    </div>

    <form method="POST" action="/import/csv" enctype="multipart/form-data" class="border rounded p-3">
        <label class="form-label">Import CSV</label>
        <input class="form-control" type="file" name="csv_file" accept=".csv" required>
        <button class="btn btn-primary mt-3">Import Data</button>
    </form>
</div>

{% endblock %}
