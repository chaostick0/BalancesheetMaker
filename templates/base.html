<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Balance Sheet Maker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="d-flex">

    <!-- Sidebar -->

    <div class="sidebar">

        <h3 class="logo">
            Balance Sheet
        </h3>

<a href="/" class="{% if request.path == '/' %}active{% endif %}">🏠 Dashboard</a>

    <a href="/company" class="{% if request.path == '/company' %}active{% endif %}">🏢 Company Details</a>

    <a href="/liabilities" class="{% if request.path == '/liabilities' %}active{% endif %}">📋 Equity & Liabilities</a>

    <a href="/assets" class="{% if request.path == '/assets' %}active{% endif %}">💰 Assets</a>

    <a href="/report" class="{% if request.path == '/report' %}active{% endif %}">📄 Final Report</a>

    <a href="/export" class="{% if request.path.startswith('/export') %}active{% endif %}">⬇ Export</a>

    </div>

    <!-- Main Content -->

    <div class="content">

        {% block content %}

        {% endblock %}

    </div>

</div>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>

</html>
