{% extends 'base.html' %}

{% block content %}
<div class="page-shell">
    <section class="hero-card">
        <div class="page-header">
            <div>
                <h2>Company Details</h2>
                <p class="subtitle">Capture the business profile and financial period so your reports stay consistent.</p>
            </div>
            <span class="badge-pill info">Setup</span>
        </div>
    </section>

    <div class="form-card">
        <form method="POST" action="/save-company">
            <div class="row g-3">
                <div class="col-md-6 form-group">
                    <label class="form-label">Company Name</label>
                    <input class="form-control" type="text" name="company_name" value="{{ company[1] if company else '' }}" required>
                </div>
                <div class="col-md-6 form-group">
                    <label class="form-label">Balance Sheet Date</label>
                    <input class="form-control" type="date" name="balance_sheet_date" value="{{ company[2] if company else '' }}" required>
                </div>
                <div class="col-md-6 form-group">
                    <label class="form-label">Currency</label>
                    <input class="form-control" name="currency" value="{{ company[3] if company else '₹' }}" required>
                </div>
                <div class="col-md-6 form-group">
                    <label class="form-label">Current Year</label>
                    <input class="form-control" name="current_year" value="{{ company[4] if company else '' }}" required>
                </div>
                <div class="col-md-6 form-group">
                    <label class="form-label">Previous Year</label>
                    <input class="form-control" name="previous_year" value="{{ company[5] if company else '' }}" required>
                </div>
            </div>
            <button class="btn btn-primary mt-3">Save Details</button>
        </form>
    </div>
</div>
{% endblock %}
