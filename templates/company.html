{% extends 'base.html' %}

{% block content %}
<div class="page-shell">
    <section class="hero-card">
        <div class="page-header">
            <div>
                <h2>Company Details</h2>
                <p class="subtitle">Capture the business profile and financial period so your reports stay consistent.</p>
            </div>
            <span class="badge-pill info">Setup</span>
        </div>
    </section>

    <div class="form-card">
        {% if not company %}
        <div class="empty-state mb-4">
            <h5>No company profile yet</h5>
            <p class="subtitle mb-0">Fill in your company details to start building a polished balance sheet.</p>
        </div>
        {% endif %}
        <form method="POST" action="/save-company">
            <div class="row g-3">
                <div class="col-md-6 form-group">
                    <label class="form-label">Company Name</label>
                    <input class="form-control" type="text" name="company_name" value="{{ company.company_name if company else '' }}" required>
                </div>
                <div class="col-md-6 form-group">
                    <label class="form-label">Balance Sheet Date</label>
                    <input class="form-control" type="date" name="balance_sheet_date" value="{{ company.balance_sheet_date if company else '' }}" required>
                </div>
                <div class="col-md-6 form-group">
                    <label class="form-label">Currency</label>
                    <input class="form-control" name="currency" value="{{ company.currency if company else '₹' }}" required>
                </div>
                <div class="col-md-6 form-group">
                    <label class="form-label">Current Year</label>
                    <input class="form-control" name="current_year" value="{{ company.current_year if company else '' }}" required>
                </div>
                <div class="col-md-6 form-group">
                    <label class="form-label">Previous Year</label>
                    <input class="form-control" name="previous_year" value="{{ company.previous_year if company else '' }}" required>
                </div>
            </div>
            <button class="btn btn-primary mt-3">Save Details</button>
        </form>
    </div>
</div>
{% endblock %}
